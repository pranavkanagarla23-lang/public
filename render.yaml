services:
  - type: web
    name: shanmukha-fashions
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: FLASK_DEBUG
        value: "false"
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
